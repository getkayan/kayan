name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: core

      - name: Architecture Lint
        run: |
          # Ensure core/ never imports kgorm/
          if grep -r 'getkayan/kayan/kgorm' core/; then
            echo "ERROR: core/ must not import kgorm/"
            exit 1
          fi
          # Ensure core/identity has zero internal deps
          if grep -r 'getkayan/kayan/core/' core/identity/*.go | grep -v '_test.go'; then
            echo "ERROR: core/identity must not import other core/ packages"
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build Core
        run: |
          cd core
          go build ./...

      - name: Build kgorm
        run: |
          cd kgorm
          go build ./...

      - name: Build kredis
        run: |
          cd kredis
          go build ./...

      - name: Build CLI
        run: |
          cd cmd/kayan-cli
          go build -o kayan-cli .
